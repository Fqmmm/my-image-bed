<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="GoogLeNet architecture diagram">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .label { font: 600 16px Arial, sans-serif; fill: #172033; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 12px Arial, sans-serif; fill: #475569; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .stem { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .inc { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .pool { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
      .head { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 8; }
      .aux { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .auxline { stroke: #7c3aed; stroke-width: 2.5; fill: none; marker-end: url(#arrowPurple); stroke-dasharray: 7 5; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="520" fill="#ffffff"/>
  <text x="40" y="48" class="title">GoogLeNet / Inception v1 主干结构</text>
  <text x="40" y="76" class="small">简化自论文 Figure 3 与 Table 1：主路径从左到右，两条紫色虚线为训练时使用、推理时丢弃的辅助分类器。</text>

  <rect x="40" y="205" width="110" height="78" class="box"/>
  <text x="95" y="234" text-anchor="middle" class="label">Input</text>
  <text x="95" y="258" text-anchor="middle" class="small">224x224x3</text>

  <path d="M150 244 H180" class="arrow"/>

  <rect x="180" y="190" width="150" height="108" class="stem"/>
  <text x="255" y="220" text-anchor="middle" class="label">Stem</text>
  <text x="255" y="245" text-anchor="middle" class="small">7x7 conv / 2</text>
  <text x="255" y="267" text-anchor="middle" class="small">max pool</text>
  <text x="255" y="289" text-anchor="middle" class="tiny">112 -> 56</text>

  <path d="M330 244 H360" class="arrow"/>

  <rect x="360" y="190" width="150" height="108" class="stem"/>
  <text x="435" y="220" text-anchor="middle" class="label">Conv Block</text>
  <text x="435" y="245" text-anchor="middle" class="small">1x1 conv</text>
  <text x="435" y="267" text-anchor="middle" class="small">3x3 conv</text>
  <text x="435" y="289" text-anchor="middle" class="tiny">56x56x192</text>

  <path d="M510 244 H540" class="arrow"/>

  <rect x="540" y="190" width="90" height="108" class="inc"/>
  <text x="585" y="228" text-anchor="middle" class="label">3a</text>
  <text x="585" y="252" text-anchor="middle" class="small">Inception</text>
  <text x="585" y="276" text-anchor="middle" class="tiny">28x28x256</text>

  <path d="M630 244 H650" class="arrow"/>

  <rect x="650" y="190" width="90" height="108" class="inc"/>
  <text x="695" y="228" text-anchor="middle" class="label">3b</text>
  <text x="695" y="252" text-anchor="middle" class="small">Inception</text>
  <text x="695" y="276" text-anchor="middle" class="tiny">28x28x480</text>

  <path d="M740 244 H760" class="arrow"/>

  <rect x="760" y="205" width="78" height="78" class="pool"/>
  <text x="799" y="236" text-anchor="middle" class="label">Pool</text>
  <text x="799" y="260" text-anchor="middle" class="tiny">14x14</text>

  <path d="M838 244 H860" class="arrow"/>

  <rect x="860" y="190" width="82" height="108" class="inc"/>
  <text x="901" y="228" text-anchor="middle" class="label">4a</text>
  <text x="901" y="252" text-anchor="middle" class="small">Inc.</text>
  <text x="901" y="276" text-anchor="middle" class="tiny">512</text>

  <path d="M942 244 H958" class="arrow"/>

  <rect x="958" y="190" width="82" height="108" class="inc"/>
  <text x="999" y="228" text-anchor="middle" class="label">4b</text>
  <text x="999" y="252" text-anchor="middle" class="small">Inc.</text>
  <text x="999" y="276" text-anchor="middle" class="tiny">512</text>

  <path d="M1040 244 H1056" class="arrow"/>

  <rect x="1056" y="190" width="82" height="108" class="inc"/>
  <text x="1097" y="228" text-anchor="middle" class="label">4c</text>
  <text x="1097" y="252" text-anchor="middle" class="small">Inc.</text>
  <text x="1097" y="276" text-anchor="middle" class="tiny">512</text>

  <path d="M1138 244 H1154" class="arrow"/>

  <rect x="1154" y="190" width="82" height="108" class="inc"/>
  <text x="1195" y="228" text-anchor="middle" class="label">4d</text>
  <text x="1195" y="252" text-anchor="middle" class="small">Inc.</text>
  <text x="1195" y="276" text-anchor="middle" class="tiny">528</text>

  <path d="M1236 244 H1252" class="arrow"/>

  <rect x="1252" y="190" width="82" height="108" class="inc"/>
  <text x="1293" y="228" text-anchor="middle" class="label">4e</text>
  <text x="1293" y="252" text-anchor="middle" class="small">Inc.</text>
  <text x="1293" y="276" text-anchor="middle" class="tiny">832</text>

  <path d="M1293 298 V332 H95 V365 H130" class="arrow"/>

  <rect x="130" y="330" width="78" height="78" class="pool"/>
  <text x="169" y="361" text-anchor="middle" class="label">Pool</text>
  <text x="169" y="385" text-anchor="middle" class="tiny">7x7</text>

  <path d="M208 369 H230" class="arrow"/>

  <rect x="230" y="315" width="100" height="108" class="inc"/>
  <text x="280" y="353" text-anchor="middle" class="label">5a</text>
  <text x="280" y="377" text-anchor="middle" class="small">Inception</text>
  <text x="280" y="401" text-anchor="middle" class="tiny">7x7x832</text>

  <path d="M330 369 H352" class="arrow"/>

  <rect x="352" y="315" width="100" height="108" class="inc"/>
  <text x="402" y="353" text-anchor="middle" class="label">5b</text>
  <text x="402" y="377" text-anchor="middle" class="small">Inception</text>
  <text x="402" y="401" text-anchor="middle" class="tiny">7x7x1024</text>

  <path d="M452 369 H482" class="arrow"/>

  <rect x="482" y="315" width="150" height="108" class="head"/>
  <text x="557" y="346" text-anchor="middle" class="label">Classifier</text>
  <text x="557" y="371" text-anchor="middle" class="small">7x7 avg pool</text>
  <text x="557" y="393" text-anchor="middle" class="small">dropout + linear</text>
  <text x="557" y="415" text-anchor="middle" class="tiny">1000-way softmax</text>

  <path d="M901 190 V132 H972" class="auxline"/>
  <rect x="972" y="94" width="170" height="76" class="aux"/>
  <text x="1057" y="123" text-anchor="middle" class="label">Auxiliary Classifier 1</text>
  <text x="1057" y="147" text-anchor="middle" class="small">from Inception 4a</text>
  <text x="1057" y="164" text-anchor="middle" class="tiny">loss weight 0.3</text>

  <path d="M1195 190 V132 H1166" class="auxline"/>
  <rect x="1166" y="94" width="170" height="76" class="aux"/>
  <text x="1251" y="123" text-anchor="middle" class="label">Auxiliary Classifier 2</text>
  <text x="1251" y="147" text-anchor="middle" class="small">from Inception 4d</text>
  <text x="1251" y="164" text-anchor="middle" class="tiny">loss weight 0.3</text>

  <rect x="760" y="442" width="570" height="44" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" rx="8"/>
  <text x="782" y="469" class="small">注：每个 Inception 模块内部包含 1x1、3x3、5x5、pooling 四类路径，并在通道维度做 filter concatenation。</text>
</svg>
