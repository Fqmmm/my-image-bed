<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <rect width="1000" height="600" fill="#ffffff"/>
  <text x="500" y="48" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="27" font-weight="600" fill="#172033">π₀ 的流时间采样分布</text>
  <text x="500" y="82" text-anchor="middle" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#586174">p(τ) = Beta((s − τ) / s; 1.5, 1)，s = 0.999</text>
  <g stroke="#dce2eb" stroke-width="1">
    <line x1="110" y1="480" x2="920" y2="480"/>
    <line x1="110" y1="380" x2="920" y2="380"/>
    <line x1="110" y1="280" x2="920" y2="280"/>
    <line x1="110" y1="180" x2="920" y2="180"/>
  </g>
  <path d="M110 480 L110 135 C245 144 365 164 476 197 C597 234 709 287 812 362 C856 395 891 430 918 477 L920 480 Z" fill="#4c78ff" fill-opacity="0.14"/>
  <path d="M110 135 C245 144 365 164 476 197 C597 234 709 287 812 362 C856 395 891 430 918 477" fill="none" stroke="#3569e8" stroke-width="5"/>
  <g stroke="#172033" stroke-width="2">
    <line x1="110" y1="480" x2="920" y2="480"/>
    <line x1="110" y1="480" x2="110" y2="105"/>
  </g>
  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" fill="#354052">
    <text x="110" y="512" text-anchor="middle">0</text>
    <text x="312.5" y="512" text-anchor="middle">0.25</text>
    <text x="515" y="512" text-anchor="middle">0.50</text>
    <text x="717.5" y="512" text-anchor="middle">0.75</text>
    <text x="920" y="512" text-anchor="middle">1.0</text>
    <text x="515" y="558" text-anchor="middle" font-size="20">流时间 τ</text>
    <text transform="translate(38 300) rotate(-90)" text-anchor="middle" font-size="20">采样概率密度 p(τ)</text>
  </g>
  <circle cx="110" cy="135" r="7" fill="#3569e8"/>
  <g font-family="Arial, Microsoft YaHei, sans-serif">
    <text x="150" y="158" font-size="20" font-weight="600" fill="#172033">高噪声阶段</text>
    <text x="150" y="187" font-size="18" fill="#586174">采样权重最高</text>
    <text x="885" y="420" text-anchor="end" font-size="18" fill="#586174">低噪声阶段</text>
    <text x="904" y="458" text-anchor="end" font-size="16" fill="#586174">截止点 s = 0.999</text>
  </g>
  <g transform="translate(690 115)">
    <rect width="230" height="84" rx="10" fill="#f3f6fb" stroke="#dce2eb"/>
    <text x="18" y="31" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#354052">τ 越小 → 噪声越强</text>
    <text x="18" y="59" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" fill="#354052">π₀ 训练时采样越频繁</text>
  </g>
</svg>
