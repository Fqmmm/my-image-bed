<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2100" viewBox="0 0 1800 2100">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#40516b"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3569e8"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d97706"/></marker>
    <style>
      .title{font:700 34px Arial,'Microsoft YaHei',sans-serif;fill:#172033}
      .subtitle{font:400 20px Arial,'Microsoft YaHei',sans-serif;fill:#536076}
      .h1{font:700 25px Arial,'Microsoft YaHei',sans-serif;fill:#172033}
      .h2{font:700 20px Arial,'Microsoft YaHei',sans-serif;fill:#172033}
      .txt{font:400 17px Arial,'Microsoft YaHei',sans-serif;fill:#29364a}
      .small{font:400 15px Arial,'Microsoft YaHei',sans-serif;fill:#4c5a70}
      .dim{font:600 15px Arial,'Microsoft YaHei',sans-serif;fill:#334155}
      .vlm{fill:#eaf1ff;stroke:#3569e8;stroke-width:2}
      .act{fill:#fff2df;stroke:#d97706;stroke-width:2}
      .shared{fill:#f1edff;stroke:#7655c5;stroke-width:2}
      .neutral{fill:#f7f9fc;stroke:#9aa7b8;stroke-width:1.5}
      .block{fill:#fff;stroke:#64748b;stroke-width:2}
      .flow{fill:none;stroke:#40516b;stroke-width:2.2;marker-end:url(#arrow)}
      .blueflow{fill:none;stroke:#3569e8;stroke-width:2.4;marker-end:url(#arrowBlue)}
      .orangeflow{fill:none;stroke:#d97706;stroke-width:2.4;marker-end:url(#arrowOrange)}
      .dash{fill:none;stroke:#8a96a8;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1800" height="2100" fill="#ffffff"/>
  <text x="900" y="52" text-anchor="middle" class="title">π₀ 完整模型：18 层双 Expert Transformer 与共享 Attention</text>
  <text x="900" y="88" text-anchor="middle" class="subtitle">蓝色：VLM Expert（宽度 2048）　橙色：Action Expert（宽度 1024）　紫色：共享注意力空间</text>

  <!-- Inputs -->
  <text x="350" y="135" text-anchor="middle" class="h1">输入与 token 化</text>
  <rect x="60" y="165" width="270" height="112" rx="12" class="vlm"/>
  <text x="195" y="195" text-anchor="middle" class="h2">n 路 RGB 图像</text>
  <text x="195" y="224" text-anchor="middle" class="txt">B × n × 224 × 224 × 3</text>
  <text x="195" y="253" text-anchor="middle" class="small">SigLIP → B × 256n × 2048</text>
  <rect x="60" y="315" width="270" height="112" rx="12" class="vlm"/>
  <text x="195" y="345" text-anchor="middle" class="h2">语言指令</text>
  <text x="195" y="374" text-anchor="middle" class="txt">token IDs：B × L</text>
  <text x="195" y="403" text-anchor="middle" class="small">Embedding → B × L × 2048</text>
  <rect x="370" y="165" width="270" height="112" rx="12" class="act"/>
  <text x="505" y="195" text-anchor="middle" class="h2">机器人状态 qₜ</text>
  <text x="505" y="224" text-anchor="middle" class="txt">B × 18</text>
  <text x="505" y="253" text-anchor="middle" class="small">Linear → B × 1 × 1024</text>
  <rect x="370" y="315" width="270" height="112" rx="12" class="act"/>
  <text x="505" y="345" text-anchor="middle" class="h2">动作嵌入输入 [Aₜᵗᵃᵘ, τ]</text>
  <text x="505" y="374" text-anchor="middle" class="txt">B × 50 × 18，τ：B</text>
  <text x="505" y="403" text-anchor="middle" class="small">动作-时间 MLP → B × 50 × 1024</text>

  <path d="M195 277 V305" class="blueflow"/>
  <path d="M195 427 V470 H228" class="blueflow"/>
  <path d="M505 277 V305" class="orangeflow"/>
  <path d="M505 427 V470 H473" class="orangeflow"/>
  <rect x="105" y="470" width="490" height="112" rx="12" class="neutral"/>
  <line x1="350" y1="470" x2="350" y2="582" stroke="#9aa7b8"/>
  <text x="228" y="500" text-anchor="middle" class="h2">VLM prefix</text>
  <text x="228" y="529" text-anchor="middle" class="txt">图像 + 语言</text>
  <text x="228" y="558" text-anchor="middle" class="dim">B × P × 2048</text>
  <text x="473" y="500" text-anchor="middle" class="h2">Action suffix</text>
  <text x="473" y="529" text-anchor="middle" class="txt">状态 + 50 个动作</text>
  <text x="473" y="558" text-anchor="middle" class="dim">B × 51 × 1024</text>
  <text x="350" y="608" text-anchor="middle" class="small">P = 256n + L；总 token 数 T = P + 51</text>

  <!-- 18 layer stack -->
  <text x="350" y="660" text-anchor="middle" class="h1">18 个串联的 Transformer Block</text>
  <text x="350" y="690" text-anchor="middle" class="small">每一层都有两套独立权重，但在 Attention 中交换信息</text>
  <path d="M350 582 V720" class="flow"/>

  <g>
    <rect x="80" y="720" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="744" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="744" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="710" text-anchor="middle" class="h2">Transformer Block 1 / 18</text>
    <text x="217" y="774" text-anchor="middle" class="txt">VLM Expert</text><text x="217" y="799" text-anchor="middle" class="small">P × 2048</text>
    <text x="482" y="774" text-anchor="middle" class="txt">Action Expert</text><text x="482" y="799" text-anchor="middle" class="small">51 × 1024</text>
    <path d="M335 779 H365" class="dash"/><path d="M365 792 H335" class="dash"/>
  </g>
  <path d="M350 840 V880" class="flow"/>
  <g>
    <rect x="80" y="880" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="904" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="904" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="870" text-anchor="middle" class="h2">Transformer Block 2 / 18</text>
    <text x="217" y="934" text-anchor="middle" class="txt">VLM Expert</text><text x="217" y="959" text-anchor="middle" class="small">共享 Attention + 独立 FFN</text>
    <text x="482" y="934" text-anchor="middle" class="txt">Action Expert</text><text x="482" y="959" text-anchor="middle" class="small">共享 Attention + 独立 FFN</text>
    <path d="M335 939 H365" class="dash"/><path d="M365 952 H335" class="dash"/>
  </g>
  <path d="M350 1000 V1040" class="flow"/>
  <g>
    <rect x="80" y="1040" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="1064" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="1064" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="1030" text-anchor="middle" class="h2">Transformer Block 3 / 18</text>
    <text x="217" y="1104" text-anchor="middle" class="txt">VLM Expert</text>
    <text x="482" y="1104" text-anchor="middle" class="txt">Action Expert</text>
    <path d="M335 1099 H365" class="dash"/><path d="M365 1112 H335" class="dash"/>
  </g>
  <path d="M350 1160 V1190" class="flow"/>
  <text x="350" y="1235" text-anchor="middle" font-family="Arial,'Microsoft YaHei'" font-size="38" fill="#64748b">⋮</text>
  <text x="350" y="1270" text-anchor="middle" class="small">Block 4 ～ Block 15：结构相同、参数逐层独立</text>
  <path d="M350 1285 V1320" class="flow"/>
  <g>
    <rect x="80" y="1320" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="1344" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="1344" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="1310" text-anchor="middle" class="h2">Transformer Block 16 / 18</text>
    <text x="217" y="1384" text-anchor="middle" class="txt">VLM Expert</text>
    <text x="482" y="1384" text-anchor="middle" class="txt">Action Expert</text>
    <path d="M335 1379 H365" class="dash"/><path d="M365 1392 H335" class="dash"/>
  </g>
  <path d="M350 1440 V1480" class="flow"/>
  <g>
    <rect x="80" y="1480" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="1504" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="1504" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="1470" text-anchor="middle" class="h2">Transformer Block 17 / 18</text>
    <text x="217" y="1544" text-anchor="middle" class="txt">VLM Expert</text>
    <text x="482" y="1544" text-anchor="middle" class="txt">Action Expert</text>
    <path d="M335 1539 H365" class="dash"/><path d="M365 1552 H335" class="dash"/>
  </g>
  <path d="M350 1600 V1640" class="flow"/>
  <g>
    <rect x="80" y="1640" width="540" height="120" rx="12" class="block"/>
    <rect x="100" y="1664" width="235" height="70" rx="9" class="vlm"/>
    <rect x="365" y="1664" width="235" height="70" rx="9" class="act"/>
    <text x="350" y="1630" text-anchor="middle" class="h2">Transformer Block 18 / 18</text>
    <text x="217" y="1704" text-anchor="middle" class="txt">VLM Expert</text>
    <text x="482" y="1704" text-anchor="middle" class="txt">Action Expert</text>
    <path d="M335 1699 H365" class="dash"/><path d="M365 1712 H335" class="dash"/>
  </g>
  <path d="M350 1760 V1805" class="flow"/>
  <rect x="105" y="1805" width="490" height="90" rx="12" class="neutral"/>
  <text x="350" y="1838" text-anchor="middle" class="h2">Final RMSNorm</text>
  <text x="228" y="1870" text-anchor="middle" class="dim">Prefix：B × P × 2048</text>
  <text x="473" y="1870" text-anchor="middle" class="dim">Suffix：B × 51 × 1024</text>
  <path d="M473 1895 V1925" class="orangeflow"/>
  <rect x="245" y="1925" width="456" height="145" rx="12" class="act"/>
  <text x="473" y="1955" text-anchor="middle" class="h2">取最后 50 个动作位置</text>
  <text x="473" y="1985" text-anchor="middle" class="dim">[B × 51 × 1024] → [B × 50 × 1024]</text>
  <text x="473" y="2016" text-anchor="middle" class="txt">共享 Linear(1024 → 18)</text>
  <text x="473" y="2048" text-anchor="middle" class="dim">vθ(Aₜᵗᵃᵘ,oₜ,τ)：[B × 50 × 18]</text>

  <!-- Expanded block -->
  <text x="1230" y="135" text-anchor="middle" class="h1">任意一个 Transformer Block 的内部数据流</text>
  <text x="1230" y="167" text-anchor="middle" class="small">下图结构在 Block 1～18 中重复；每层参数不同</text>
  <rect x="720" y="195" width="1020" height="1795" rx="18" fill="#fbfcfe" stroke="#64748b" stroke-width="2"/>

  <rect x="760" y="240" width="400" height="76" rx="10" class="vlm"/>
  <text x="960" y="270" text-anchor="middle" class="h2">VLM hidden Xᵥˡ</text>
  <text x="960" y="297" text-anchor="middle" class="dim">B × P × 2048</text>
  <rect x="1300" y="240" width="400" height="76" rx="10" class="act"/>
  <text x="1500" y="270" text-anchor="middle" class="h2">Action hidden Xₐˡ</text>
  <text x="1500" y="297" text-anchor="middle" class="dim">B × 51 × 1024</text>
  <path d="M960 316 V360" class="blueflow"/><path d="M1500 316 V360" class="orangeflow"/>

  <rect x="780" y="350" width="360" height="82" rx="9" class="vlm"/>
  <text x="960" y="374" text-anchor="middle" class="txt">VLM Pre-Attention RMSNorm</text>
  <text x="960" y="410" text-anchor="middle" class="dim">B × P × 2048 → B × P × 2048</text>
  <rect x="1320" y="350" width="360" height="82" rx="9" class="act"/>
  <text x="1500" y="374" text-anchor="middle" class="txt">Action Pre-Attention RMSNorm</text>
  <text x="1500" y="410" text-anchor="middle" class="dim">B × 51 × 1024 → B × 51 × 1024</text>
  <path d="M960 432 V468" class="blueflow"/><path d="M1500 432 V468" class="orangeflow"/>

  <rect x="760" y="468" width="400" height="175" rx="10" class="vlm"/>
  <text x="960" y="498" text-anchor="middle" class="h2">VLM 专属 Q/K/V 投影</text>
  <text x="960" y="532" text-anchor="middle" class="dim">Qᵥ：B × P × 8 × 256</text>
  <text x="960" y="566" text-anchor="middle" class="dim">Kᵥ：B × P × 1 × 256</text>
  <text x="960" y="600" text-anchor="middle" class="dim">Vᵥ：B × P × 1 × 256</text>
  <text x="960" y="628" text-anchor="middle" class="small">投影参数属于 VLM Expert</text>
  <rect x="1300" y="468" width="400" height="175" rx="10" class="act"/>
  <text x="1500" y="498" text-anchor="middle" class="h2">Action 专属 Q/K/V 投影</text>
  <text x="1500" y="532" text-anchor="middle" class="dim">Qₐ：B × 51 × 8 × 256</text>
  <text x="1500" y="566" text-anchor="middle" class="dim">Kₐ：B × 51 × 1 × 256</text>
  <text x="1500" y="600" text-anchor="middle" class="dim">Vₐ：B × 51 × 1 × 256</text>
  <text x="1500" y="628" text-anchor="middle" class="small">投影参数属于 Action Expert</text>
  <path d="M960 643 V698 H1140" class="blueflow"/>
  <path d="M1500 643 V698 H1320" class="orangeflow"/>

  <rect x="1000" y="682" width="460" height="154" rx="12" class="shared"/>
  <text x="1230" y="711" text-anchor="middle" class="h2">沿 token 序列维分别拼接</text>
  <text x="1230" y="742" text-anchor="middle" class="dim">Q = [Qᵥ, Qₐ]：B × T × 8 × 256</text>
  <text x="1230" y="771" text-anchor="middle" class="dim">K = [Kᵥ, Kₐ]：B × T × 1 × 256</text>
  <text x="1230" y="800" text-anchor="middle" class="dim">V = [Vᵥ, Vₐ]：B × T × 1 × 256</text>
  <text x="1230" y="825" text-anchor="middle" class="small">T = P + 51；三者分别拼接，不是把 K 与 V 合并</text>
  <path d="M1230 836 V850" class="flow"/>

  <rect x="900" y="850" width="660" height="110" rx="10" class="shared"/>
  <text x="1230" y="875" text-anchor="middle" class="h2">Q、K 应用 RoPE（V 不旋转）</text>
  <text x="1230" y="925" text-anchor="middle" class="dim">Q：[B × T × 8 × 256] → Q′：[B × T × 8 × 256]</text>
  <text x="1230" y="950" text-anchor="middle" class="dim">K：[B × T × 1 × 256] → K′：[B × T × 1 × 256]</text>
  <path d="M1230 960 V968" class="flow"/>

  <rect x="900" y="968" width="660" height="190" rx="12" class="shared"/>
  <text x="1230" y="1002" text-anchor="middle" class="h2">Blockwise Masked Grouped-Query Attention</text>
  <text x="1230" y="1040" text-anchor="middle" class="dim">Scores = QKᵀ / √256</text>
  <text x="1230" y="1075" text-anchor="middle" class="dim">Prob = softmax(Scores + Mask)</text>
  <text x="1230" y="1110" text-anchor="middle" class="dim">Z = Prob · V　→　B × T × 8 × 256</text>
  <text x="1230" y="1142" text-anchor="middle" class="small">Prefix 只看 Prefix；状态看 Prefix+状态；动作看 Prefix+状态+全部动作</text>
  <path d="M1230 1158 V1202" class="flow"/>

  <rect x="1000" y="1202" width="460" height="95" rx="10" class="shared"/>
  <text x="1230" y="1230" text-anchor="middle" class="h2">按 token 所属 Expert 拆分</text>
  <text x="1230" y="1258" text-anchor="middle" class="dim">Zᵥ：[B × P × 8 × 256]（前 P 个 token）</text>
  <text x="1230" y="1283" text-anchor="middle" class="dim">Zₐ：[B × 51 × 8 × 256]（后 51 个 token）</text>
  <path d="M1100 1297 V1320 H960" class="blueflow"/>
  <path d="M1360 1297 V1320 H1500" class="orangeflow"/>

  <rect x="760" y="1320" width="400" height="88" rx="10" class="vlm"/>
  <text x="960" y="1351" text-anchor="middle" class="h2">VLM 专属 O 投影</text>
  <text x="960" y="1382" text-anchor="middle" class="dim">B × P × 8 × 256 → B × P × 2048</text>
  <rect x="1300" y="1320" width="400" height="88" rx="10" class="act"/>
  <text x="1500" y="1351" text-anchor="middle" class="h2">Action 专属 O 投影</text>
  <text x="1500" y="1382" text-anchor="middle" class="dim">B × 51 × 8 × 256 → B × 51 × 1024</text>
  <path d="M960 1408 V1442" class="blueflow"/><path d="M1500 1408 V1442" class="orangeflow"/>
  <path d="M760 278 H735 V1460 H940" class="blueflow"/>
  <path d="M1700 278 H1725 V1460 H1520" class="orangeflow"/>
  <circle cx="960" cy="1460" r="20" fill="#ffffff" stroke="#3569e8" stroke-width="2.5"/>
  <text x="960" y="1468" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#3569e8">⊕</text>
  <circle cx="1500" cy="1460" r="20" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
  <text x="1500" y="1468" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#d97706">⊕</text>
  <text x="790" y="1438" class="small">Xᵥˡ 残差旁路</text>
  <text x="1670" y="1438" text-anchor="end" class="small">Xₐˡ 残差旁路</text>
  <path d="M960 1480 V1540" class="blueflow"/><path d="M1500 1480 V1540" class="orangeflow"/>
  <text x="982" y="1524" class="dim">Yᵥˡ</text>
  <text x="1522" y="1524" class="dim">Yₐˡ</text>

  <rect x="780" y="1540" width="360" height="90" rx="9" class="vlm"/>
  <text x="960" y="1565" text-anchor="middle" class="txt">VLM Pre-FFN RMSNorm</text>
  <text x="960" y="1605" text-anchor="middle" class="dim">B × P × 2048 → B × P × 2048</text>
  <rect x="1320" y="1540" width="360" height="90" rx="9" class="act"/>
  <text x="1500" y="1565" text-anchor="middle" class="txt">Action Pre-FFN RMSNorm</text>
  <text x="1500" y="1605" text-anchor="middle" class="dim">B × 51 × 1024 → B × 51 × 1024</text>
  <path d="M960 1630 V1660" class="blueflow"/><path d="M1500 1630 V1660" class="orangeflow"/>

  <rect x="760" y="1660" width="400" height="105" rx="10" class="vlm"/>
  <text x="960" y="1692" text-anchor="middle" class="h2">VLM Gated FFN</text>
  <text x="960" y="1724" text-anchor="middle" class="dim">B × P × 2048 → B × P × 16384</text>
  <text x="960" y="1748" text-anchor="middle" class="dim">→ B × P × 2048</text>
  <rect x="1300" y="1660" width="400" height="105" rx="10" class="act"/>
  <text x="1500" y="1692" text-anchor="middle" class="h2">Action Gated FFN</text>
  <text x="1500" y="1724" text-anchor="middle" class="dim">B × 51 × 1024 → B × 51 × 4096</text>
  <text x="1500" y="1748" text-anchor="middle" class="dim">→ B × 51 × 1024</text>
  <path d="M960 1765 V1822" class="blueflow"/><path d="M1500 1765 V1822" class="orangeflow"/>
  <path d="M960 1480 V1510 H740 V1842 H940" class="blueflow"/>
  <path d="M1500 1480 V1510 H1720 V1842 H1520" class="orangeflow"/>
  <circle cx="960" cy="1842" r="20" fill="#ffffff" stroke="#3569e8" stroke-width="2.5"/>
  <text x="960" y="1850" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#3569e8">⊕</text>
  <circle cx="1500" cy="1842" r="20" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
  <text x="1500" y="1850" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#d97706">⊕</text>
  <text x="790" y="1820" class="small">Yᵥˡ 残差旁路</text>
  <text x="1670" y="1820" text-anchor="end" class="small">Yₐˡ 残差旁路</text>
  <path d="M960 1862 V1918" class="blueflow"/><path d="M1500 1862 V1918" class="orangeflow"/>
  <rect x="760" y="1918" width="400" height="52" rx="9" class="vlm"/>
  <text x="960" y="1951" text-anchor="middle" class="dim">Xᵥˡ⁺¹：B × P × 2048</text>
  <rect x="1300" y="1918" width="400" height="52" rx="9" class="act"/>
  <text x="1500" y="1951" text-anchor="middle" class="dim">Xₐˡ⁺¹：B × 51 × 1024</text>

  <text x="1230" y="2038" text-anchor="middle" class="small">共享的只是 Attention 计算空间；Q/K/V/O 投影、RMSNorm 与 FFN 均按 Expert 分开。</text>
</svg>
